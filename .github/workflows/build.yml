name: Build & Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  DOTNET_VERSION: "10.0.x"
  DNSPY_TAG: "v6.6.0"
  DNSPY_REPO: "dnSpyEx/dnSpy"

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        include:
          - arch: x64
            asset_pattern: 'dnSpy-net.*win64.*\.zip'
            asset_fallback: "dnSpy-net-win64.zip"
          - arch: x86
            asset_pattern: 'dnSpy-net.*win32.*\.zip'
            asset_fallback: "dnSpy-net-win32.zip"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download dnSpy binaries (${{ matrix.arch }})
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $url = "https://api.github.com/repos/${{ env.DNSPY_REPO }}/releases/tags/${{ env.DNSPY_TAG }}"
          Write-Host "Fetching release info from $url"

          $headers = @{
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          if ($env:GITHUB_TOKEN) {
            $headers["Authorization"] = "Bearer $env:GITHUB_TOKEN"
          }

          $resp = Invoke-RestMethod -Uri $url -Headers $headers
          $pattern = '${{ matrix.asset_pattern }}'
          $assets = $resp.assets | Where-Object { $_.name -match $pattern }

          if (-not $assets) {
            $fallback = '${{ matrix.asset_fallback }}'
            Write-Host "Trying fallback: $fallback..."
            $assets = $resp.assets | Where-Object { $_.name -eq $fallback }
          }

          if (-not $assets) {
            Write-Host "Available assets:"
            $resp.assets | ForEach-Object { Write-Host "  $($_.name)" }
            Write-Host "##[error]No suitable dnSpy zip found for ${{ matrix.arch }}."
            exit 1
          }

          if ($assets.Count -ne 1) {
            Write-Host "##[error]Expected one matching asset, found $($assets.Count):"
            $assets | ForEach-Object { Write-Host "  - $($_.name)" }
            exit 1
          }

          $asset = $assets[0]
          Write-Host "Downloading: $($asset.name)"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "$env:TEMP\dnspy.zip" -ErrorAction Stop
          Write-Host "Download complete"

          $extractDir = "$env:TEMP\dnspy"
          if (Test-Path $extractDir) { Remove-Item $extractDir -Recurse -Force }
          New-Item -ItemType Directory -Path $extractDir -Force | Out-Null
          Expand-Archive -Path "$env:TEMP\dnspy.zip" -DestinationPath $extractDir -Force

          $binDir = Join-Path $extractDir "bin"
          if (-not (Test-Path $binDir)) {
            $exePath = Get-ChildItem -Path $extractDir -Recurse -Filter "dnSpy.exe" | Select-Object -First 1
            if (-not $exePath) {
              Write-Host "##[error]Could not find dnSpy.exe in extracted archive."
              Get-ChildItem $extractDir -Recurse | Select-Object FullName | Format-Table -AutoSize
              exit 1
            }
            $binDir = Split-Path $exePath.FullName -Parent
          }
          Write-Host "Using DLL source dir: $binDir"

          New-Item -ItemType Directory -Path "deps" -Force | Out-Null
          $required = @(
            "dnSpy.Contracts.DnSpy.dll",
            "dnSpy.Contracts.Logic.dll",
            "ICSharpCode.Decompiler.dll",
            "dnlib.dll"
          )
          $missing = @()
          foreach ($dll in $required) {
            $src = Join-Path $binDir $dll
            if (Test-Path $src) {
              Copy-Item $src "deps/" -Force
              Write-Host "  Copied: $dll"
            } else {
              $missing += $dll
              Write-Host "  Missing: $dll" -ForegroundColor Red
            }
          }

          if ($missing.Count -gt 0) {
            Write-Host "##[error]Failed to copy required DLLs: $($missing -join ', ')"
            Write-Host "  binDir = $binDir"
            Get-ChildItem $binDir -Filter "*.dll" | Select-Object Name | Format-Table -AutoSize
            exit 1
          }

          Write-Host "deps/ ready (${{ matrix.arch }}) with $((Get-ChildItem deps/*.dll).Count) DLLs."

      - name: Verify deps
        run: |
          $required = @(
            "dnSpy.Contracts.DnSpy.dll",
            "dnSpy.Contracts.Logic.dll",
            "ICSharpCode.Decompiler.dll",
            "dnlib.dll"
          )
          $missing = @()
          foreach ($dll in $required) {
            if (-not (Test-Path (Join-Path "deps" $dll))) {
              $missing += $dll
            }
          }
          if ($missing.Count -gt 0) {
            Write-Host "##[error]Missing required DLLs in deps/:"
            $missing | ForEach-Object { Write-Host "  - $_" }
            exit 1
          }
          Write-Host "All required deps are present (${{ matrix.arch }})."

      - name: Build
        run: dotnet build src/dnSpy.MCP/dnSpy.MCP.csproj -c Release --nologo -v q

      - name: Check build output
        run: |
          $dll = "src/dnSpy.MCP/bin/Release/net10.0-windows/dnSpy.MCP.x.dll"
          if (Test-Path $dll) {
            $size = [Math]::Round((Get-Item $dll).Length / 1KB, 1)
            Write-Host "Build succeeded (${{ matrix.arch }}): $dll ($size KB)"
          } else {
            Write-Host "##[error]DLL not found at $dll"
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dnSpy-MCP-win-${{ matrix.arch }}
          path: |
            src/dnSpy.MCP/bin/Release/net10.0-windows/dnSpy.MCP.x.dll
            src/dnSpy.MCP/bin/Release/net10.0-windows/dnSpy.MCP.x.deps.json
            src/dnSpy.MCP/bin/Release/net10.0-windows/dnSpy.MCP.x.pdb
          retention-days: 7
