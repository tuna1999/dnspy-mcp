name: Release

on:
  push:
    branches: [master, main]
  workflow_dispatch:

env:
  DNSPY_TAG: "v6.6.0"
  DNSPY_REPO: "dnSpyEx/dnSpy"

permissions:
  contents: write

jobs:
  # ── Detect version & skip check ──────────────────────────────────
  prepare:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      skip: ${{ steps.check_tag.outputs.skip }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Extract version
        id: version
        shell: pwsh
        run: |
          $content = Get-Content "src/dnSpy.MCP/dnSpy.MCP.csproj" -Raw
          if ($content -match '<Version>(\d+\.\d+\.\d+)</Version>') {
            $version = $Matches[1]
            "version=$version" >> $env:GITHUB_OUTPUT
            "tag=v$version" >> $env:GITHUB_OUTPUT
            Write-Host "Detected version: $version"
          } else {
            Write-Host "##[error]Could not find <Version> in dnSpy.MCP.csproj"
            exit 1
          }

      - name: Check if tag exists
        id: check_tag
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          git fetch --tags
          $existing = git tag -l $tag
          if ($existing) {
            Write-Host "Tag $tag already exists. Skipping release."
            "skip=true" >> $env:GITHUB_OUTPUT
          } else {
            "skip=false" >> $env:GITHUB_OUTPUT
            Write-Host "Tag $tag does not exist. Will create release."
          }

  # ── Build for both architectures ─────────────────────────────────
  build:
    needs: prepare
    if: needs.prepare.outputs.skip != 'true'
    runs-on: windows-latest

    strategy:
      matrix:
        include:
          - arch: x64
            asset_pattern: 'dnSpy-net.*win64.*\.zip'
            asset_fallback: "dnSpy-net-win64.zip"
          - arch: x86
            asset_pattern: 'dnSpy-net.*win32.*\.zip'
            asset_fallback: "dnSpy-net-win32.zip"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Download dnSpy binaries (${{ matrix.arch }})
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $url = "https://api.github.com/repos/${{ env.DNSPY_REPO }}/releases/tags/${{ env.DNSPY_TAG }}"
          $headers = @{
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          if ($env:GITHUB_TOKEN) { $headers["Authorization"] = "Bearer $env:GITHUB_TOKEN" }

          $resp = Invoke-RestMethod -Uri $url -Headers $headers
          $pattern = '${{ matrix.asset_pattern }}'
          $assets = $resp.assets | Where-Object { $_.name -match $pattern }

          if (-not $assets) {
            $fallback = '${{ matrix.asset_fallback }}'
            Write-Host "Trying fallback: $fallback..."
            $assets = $resp.assets | Where-Object { $_.name -eq $fallback }
          }

          if (-not $assets) {
            Write-Host "Available assets:"
            $resp.assets | ForEach-Object { Write-Host "  $($_.name)" }
            Write-Host "##[error]No suitable dnSpy zip found for ${{ matrix.arch }}."
            exit 1
          }

          $asset = $assets[0]
          Write-Host "Downloading: $($asset.name)"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "$env:TEMP\dnspy.zip" -ErrorAction Stop

          $extractDir = "$env:TEMP\dnspy"
          if (Test-Path $extractDir) { Remove-Item $extractDir -Recurse -Force }
          New-Item -ItemType Directory -Path $extractDir -Force | Out-Null
          Expand-Archive -Path "$env:TEMP\dnspy.zip" -DestinationPath $extractDir -Force

          $binDir = Join-Path $extractDir "bin"
          if (-not (Test-Path $binDir)) {
            $exePath = Get-ChildItem -Path $extractDir -Recurse -Filter "dnSpy.exe" | Select-Object -First 1
            if (-not $exePath) {
              Write-Host "##[error]Could not find dnSpy.exe in extracted archive."
              exit 1
            }
            $binDir = Split-Path $exePath.FullName -Parent
          }

          New-Item -ItemType Directory -Path "deps" -Force | Out-Null
          @("dnSpy.Contracts.DnSpy.dll","dnSpy.Contracts.Logic.dll","ICSharpCode.Decompiler.dll","dnlib.dll") | ForEach-Object {
            Copy-Item (Join-Path $binDir $_) "deps/" -Force
          }
          Write-Host "deps/ ready (${{ matrix.arch }})"

      - name: Build
        run: dotnet build src/dnSpy.MCP/dnSpy.MCP.csproj -c Release --nologo -v q

      - name: Package
        shell: pwsh
        run: |
          $outDir = "release-out"
          New-Item -ItemType Directory -Path $outDir -Force | Out-Null
          Copy-Item "src/dnSpy.MCP/bin/Release/net10.0-windows/dnSpy.MCP.x.dll" $outDir
          Copy-Item "src/dnSpy.MCP/bin/Release/net10.0-windows/dnSpy.MCP.x.deps.json" $outDir

          Compress-Archive -Path "$outDir/*" -DestinationPath "dnSpy.MCP.x-${{ matrix.arch }}.zip" -Force
          Write-Host "Packaged: dnSpy.MCP.x-${{ matrix.arch }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.arch }}
          path: dnSpy.MCP.x-${{ matrix.arch }}.zip
          retention-days: 1

  # ── Create GitHub Release with both zips ─────────────────────────
  release:
    needs: [prepare, build]
    if: needs.prepare.outputs.skip != 'true'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Download x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: release-x64
          path: ./artifacts

      - name: Download x86 artifact
        uses: actions/download-artifact@v4
        with:
          name: release-x86
          path: ./artifacts

      - name: Generate changelog
        shell: pwsh
        run: |
          $previousTag = git describe --tags --abbrev=0 HEAD~1 2>$null
          if ($LASTEXITCODE -ne 0 -or -not $previousTag) {
            $log = git log --oneline -20 --pretty="- %s"
          } else {
            $log = git log "$previousTag..HEAD" --oneline --pretty="- %s"
          }
          $log | Out-File -FilePath "CHANGELOG.txt" -Encoding utf8
          Write-Host "Changelog generated ($(($log | Measure-Object).Count) commits)"

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ needs.prepare.outputs.tag }}"
          $version = "${{ needs.prepare.outputs.version }}"
          $changelog = Get-Content "CHANGELOG.txt" -Raw

          git tag $tag
          git push origin $tag

          $releaseBody = @"
          ## dnSpy MCP v$version

          ### Changes
          $changelog

          ### Installation
          1. Download the zip matching your dnSpy version:
             - ``dnSpy.MCP.x-x64.zip`` for dnSpy **64-bit**
             - ``dnSpy.MCP.x-x86.zip`` for dnSpy **32-bit**
          2. Extract to ``<dnSpy>/bin/Extensions/``
          3. Restart dnSpy
          4. Start MCP Server from the Tools menu
          "@

          gh release create $tag `
            "./artifacts/dnSpy.MCP.x-x64.zip" `
            "./artifacts/dnSpy.MCP.x-x86.zip" `
            --title "v$version" `
            --notes $releaseBody
